<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЗС Петрозаводска — Топливо онлайн</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: #1a1a2e; }
        #container { width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; }
        
        #panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(22,33,62,0.85); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 1000;
            width: 260px; color: white; border: 1px solid rgba(255,255,255,0.1);
        }
        #panel h2 { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #ffcc00, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #panel .sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
        #panel button {
            width: 100%; padding: 8px 12px; margin: 3px 0;
            border: none; border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 11px; color: white;
            transition: 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .btn-all { background: rgba(255,255,255,0.15); }
        .btn-open { background: linear-gradient(135deg, #28a745, #20c997); }
        .btn-closed { background: linear-gradient(135deg, #dc3545, #ff6b6b); }
        .stats { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 9px; color: rgba(255,255,255,0.6); }
        .stat { background: rgba(255,255,255,0.05); padding: 6px; border-radius: 8px; text-align: center; }
        .stat .num { font-size: 18px; font-weight: 700; color: white; }
        
        #updateBadge {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 8px 18px; border-radius: 20px; font-size: 10px;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        
        .marker-badge {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; border: 3px solid white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }
        .marker-badge.closed { animation: none; opacity: 0.6; }
        .marker-badge.breaker { animation: pulseYellow 2s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(40,167,69,0.4)} 50%{box-shadow:0 0 0 16px rgba(40,167,69,0)} }
        @keyframes pulseYellow { 0%,100%{box-shadow:0 0 0 0 rgba(255,193,7,0.4)} 50%{box-shadow:0 0 0 16px rgba(255,193,7,0)} }
        
        .popup-card { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-width: 240px; background: white; padding: 12px; border-radius: 10px; color: #1a1a2e; }
        .popup-card .brand { font-size: 15px; font-weight: 700; }
        .popup-card .addr { font-size: 12px; color: #555; margin: 3px 0; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; margin: 4px 0; }
        .status-open { background: #d4edda; color: #155724; }
        .status-closed { background: #f8d7da; color: #721c24; }
        .status-break { background: #fff3cd; color: #856404; }
        .fuel-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0; }
        .fuel-badge { padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; }
        .fuel-yes { background: #d4edda; color: #155724; }
        .fuel-no { background: #f8d7da; color: #721c24; text-decoration: line-through; }
        .popup-card .note { font-size: 11px; color: #856404; background: #fff3cd; padding: 4px 8px; border-radius: 6px; margin: 4px 0; }
        
        @media (max-width:600px){ #panel{top:10px;left:10px;right:10px;width:auto;padding:12px} }
    </style>
</head>
<body>
    <div id="container">
        <div id="panel">
            <h2>⛽ Топливо ПТЗ</h2>
            <div class="sub">Петрозаводск • автообновление</div>
            <button class="btn-all" onclick="showAll()">📍 Все заправки</button>
            <button class="btn-open" onclick="filterOpen()">🟢 Открытые</button>
            <button class="btn-closed" onclick="filterClosed()">🔴 Закрытые</button>
            <div class="stats">
                <div class="stat"><div class="num" id="totalCount">—</div>всего</div>
                <div class="stat"><div class="num" id="openCount">—</div>открыто</div>
                <div class="stat"><div class="num" id="closedCount">—</div>закрыто</div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <div id="updateBadge">🕐 Загрузка данных...</div>

    <script src="https://maps.api.2gis.ru/2.0/loader.js?pkg=full"></script>
    
    <script>
        let stations = [];
        let map, markers=[];

        // Загружаем данные из JSON
        async function loadData() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/Yulvonptz/azs/main/stations_data.json?' + Date.now());
                const data = await res.json();
                if (data.stations && data.stations.length > 0) {
                    stations = data.stations;
                    document.getElementById('updateBadge').textContent = '✅ Обновлено: ' + data.updated;
                }
            } catch(e) {
                // Если JSON ещё нет — используем встроенные данные
                stations = [
                    { name:"Лукойл", addr:"Шуйское ш., 3", lat:61.809587, lon:34.288928, status:"open", fuel:{DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhVGoz" },
                    { name:"Лукойл", addr:"Лесной пр-т, 53Б", lat:61.784065, lon:34.302505, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhVTL1" },
                    { name:"Лукойл", addr:"Лососинское ш., 48", lat:61.76139, lon:34.300821, status:"closed", note:"Бензовоз в пути из СПБ", yandex_url:"https://yandex.com/maps/-/CTqhZIPM" },
                    { name:"Лукойл", addr:"Новая Вилга", lat:61.821271, lon:34.145773, status:"break", breakTime:"14:00-15:00", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhZDN4" },
                    { name:"Роснефть", addr:"ул. Ломоносова, 1", lat:61.768008, lon:34.390582, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhfZmm" },
                    { name:"Роснефть", addr:"ул. Высотная, 11", lat:61.7955, lon:34.3712, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhjN-R" },
                    { name:"Роснефть", addr:"Лесной пр-т, 79", lat:61.792332, lon:34.298814, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqh64Kx" },
                    { name:"Роснефть", addr:"Лососинское ш., 12а", lat:61.771146, lon:34.331702, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqh6W4T" },
                    { name:"Роснефть", addr:"Комсомольский пр-т, 22", lat:61.757929, lon:34.354326, status:"break", breakTime:"13:00-14:00", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhfIJT" },
                    { name:"Роснефть", addr:"Университетская ул., 1", lat:61.777314, lon:34.307761, status:"closed", yandex_url:"https://yandex.com/maps/-/CTqhbT97" },
                    { name:"Газпромнефть", addr:"Высотная ул., 4", lat:61.773844, lon:34.336592, status:"open", fuel:{92:true,95:true,DT:true}, yandex_url:"https://yandex.com/maps/-/CTqhjPY1" },
                    { name:"Опти", addr:"Казарменская ул., 1", lat:61.783959, lon:34.380373, status:"closed", yandex_url:"https://yandex.com/maps/-/CTqhnP~e" },
                    { name:"Татнефть", addr:"Репникова, 1а", lat:61.764098, lon:34.413958, status:"closed", yandex_url:"https://yandex.com/maps/-/CTq3MBpy" }
                ];
                document.getElementById('updateBadge').textContent = '⚠ Данные по умолчанию';
            }
            showAll();
        }

        DG.then(() => {
            map = DG.map('map', { center: [61.78, 34.34], zoom: 12, fullscreenControl: true });
            loadData();
        });

        function makeIcon(s){
            const color=s.status==='open'?'#28a745':s.status==='break'?'#ffc107':'#dc3545';
            const cls=s.status==='closed'?'closed':s.status==='break'?'breaker':'';
            return DG.divIcon({html:`<div class="marker-badge ${cls}" style="background:${color};">⛽</div>`,iconSize:[36,36],iconAnchor:[18,18]});
        }

        function makePopup(s){
            const sc=s.status==='open'?'status-open':s.status==='break'?'status-break':'status-closed';
            const st=s.status==='open'?'🟢 Работает':s.status==='break'?`🟡 Перерыв ${s.breakTime||''}`:'🔴 Закрыто';
            let fuelHtml='';
            if(s.fuel) {
                ['92','95','98','DT'].forEach(t=>{
                    if(s.fuel[t]===true) fuelHtml+=`<span class="fuel-badge fuel-yes">${t}</span>`;
                    else if(s.fuel[t]===false) fuelHtml+=`<span class="fuel-badge fuel-no">${t}</span>`;
                });
            }
            const yandexLink=s.yandex_url?`<br><a href="${s.yandex_url}" target="_blank" style="color:#007bff;">🗺 Открыть в Яндекс</a>`:'';
            return `
                <div class="popup-card">
                    <div class="brand">${s.name}</div>
                    <div class="addr">📍 ${s.addr}</div>
                    <span class="status-badge ${sc}">${st}</span>
                    ${fuelHtml?`<div class="fuel-row">${fuelHtml}</div>`:''}
                    ${s.note?`<div class="note">⚠ ${s.note}</div>`:''}
                    ${yandexLink}
                </div>`;
        }

        function renderStations(list){
            markers.forEach(m=>map.removeLayer(m));markers=[];
            let open=0,closed=0;
            list.forEach(s=>{
                if(s.status==='open')open++;
                if(s.status==='closed')closed++;
                const m=DG.marker([s.lat,s.lon],{icon:makeIcon(s)});
                m.bindPopup(makePopup(s));m.addTo(map);markers.push(m);
            });
            document.getElementById('totalCount').textContent=list.length;
            document.getElementById('openCount').textContent=open;
            document.getElementById('closedCount').textContent=closed;
        }

        function showAll(){renderStations(stations);}
        function filterOpen(){renderStations(stations.filter(s=>s.status==='open'));}
        function filterClosed(){renderStations(stations.filter(s=>s.status==='closed'));}

        // Автообновление каждые 5 минут
        setInterval(loadData, 300000);
    </script>
</body>
</html>
